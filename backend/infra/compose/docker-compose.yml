services:
  postgres:
    image: postgres:16
    container_name: newsfeed-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - newsfeed_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: newsfeed-redis
    ports:
      - "6379:6379"
    volumes:
      - feed_cache:/data

volumes:
  newsfeed_data:
  feed_cache:
